<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Garden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080c10; overflow: hidden; font-family: Georgia, serif; }
  canvas { display: block; cursor: crosshair; }

  #intro {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #080c10;
    z-index: 100;
    color: rgba(160, 180, 140, 0.7);
    text-align: center;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }

  #intro h1 {
    font-size: 28px;
    font-weight: normal;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    color: rgba(160, 180, 140, 0.5);
  }

  #intro p {
    font-size: 14px;
    max-width: 400px;
    line-height: 1.7;
    color: rgba(160, 180, 140, 0.4);
    margin-bottom: 8px;
  }

  #intro .start {
    margin-top: 24px;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(160, 180, 140, 0.3);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  #palette {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 10;
    background: rgba(8, 12, 16, 0.8);
    padding: 10px 20px;
    border-radius: 24px;
    backdrop-filter: blur(6px);
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #palette.visible { opacity: 1; }

  .creature-btn {
    background: none;
    border: 1px solid rgba(160, 180, 140, 0.2);
    color: rgba(160, 180, 140, 0.6);
    padding: 6px 14px;
    border-radius: 14px;
    font-family: Georgia, serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.05em;
  }

  .creature-btn:hover {
    border-color: rgba(160, 180, 140, 0.4);
    color: rgba(160, 180, 140, 0.8);
  }

  .creature-btn.active {
    background: rgba(160, 180, 140, 0.1);
    border-color: rgba(160, 180, 140, 0.5);
    color: rgba(180, 200, 160, 0.9);
  }

  .creature-btn .emoji {
    margin-right: 4px;
  }

  #clear-btn {
    background: none;
    border: 1px solid rgba(180, 100, 100, 0.2);
    color: rgba(180, 100, 100, 0.5);
    padding: 6px 12px;
    border-radius: 14px;
    font-family: Georgia, serif;
    font-size: 11px;
    cursor: pointer;
    margin-left: 8px;
    transition: all 0.2s ease;
  }

  #clear-btn:hover {
    border-color: rgba(180, 100, 100, 0.4);
    color: rgba(180, 100, 100, 0.7);
  }

  #hint {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(160, 180, 140, 0.3);
    font-size: 12px;
    letter-spacing: 0.05em;
    z-index: 10;
    opacity: 0;
    transition: opacity 1s ease;
    pointer-events: none;
  }

  #hint.visible { opacity: 1; }
</style>
</head>
<body>

<div id="intro">
  <h1>Night Garden</h1>
  <p>Place creatures in the dark. They'll sing.</p>
  <p class="start">click anywhere to begin</p>
</div>

<canvas id="canvas"></canvas>

<div id="palette">
  <button class="creature-btn active" data-type="cricket"><span class="emoji">🦗</span> cricket</button>
  <button class="creature-btn" data-type="frog"><span class="emoji">🐸</span> frog</button>
  <button class="creature-btn" data-type="owl"><span class="emoji">🦉</span> owl</button>
  <button class="creature-btn" data-type="wind"><span class="emoji">🌿</span> wind</button>
  <button class="creature-btn" data-type="water"><span class="emoji">💧</span> water</button>
  <button id="clear-btn">clear</button>
</div>

<div id="hint">click to place a creature</div>

<script>
// Night Garden — generative ambient soundscape
// Each creature type produces its own synthesized sound using Web Audio API
// No samples, no files — everything grown from oscillators and noise

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let audioCtx = null;
let creatures = [];
let selectedType = 'cricket';
let started = false;
let time = 0;
let stars = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  generateStars();
}

function generateStars() {
  stars = [];
  const count = Math.floor((W * H) / 3000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.7,
      size: Math.random() * 1.2 + 0.3,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2,
      brightness: Math.random() * 0.3 + 0.1
    });
  }
}

window.addEventListener('resize', resize);
resize();

// --- Audio engine ---

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Master compressor to keep things gentle
  const compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -20;
  compressor.knee.value = 20;
  compressor.ratio.value = 8;
  compressor.attack.value = 0.01;
  compressor.release.value = 0.2;
  compressor.connect(audioCtx.destination);
  window.masterOut = compressor;
}

// Create noise buffer for wind/water
function createNoiseBuffer(duration) {
  const length = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < length; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  return buffer;
}

// --- Creature sound generators ---

function createCricketSound(creature) {
  // Cricket chirp: rapid amplitude-modulated tone
  // Each cricket has a slightly different pitch and rhythm
  const baseFreq = 4200 + Math.random() * 1200;
  const chirpRate = 14 + Math.random() * 8; // chirps per second within a burst
  const burstInterval = 1.5 + Math.random() * 3; // seconds between chirp bursts
  const burstDuration = 0.3 + Math.random() * 0.5;

  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  const panner = audioCtx.createStereoPanner();
  panner.pan.value = (creature.x / W) * 2 - 1;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = baseFreq;
  filter.Q.value = 15;

  const osc = audioCtx.createOscillator();
  osc.type = 'square';
  osc.frequency.value = baseFreq;

  // Amplitude modulation for chirp texture
  const lfo = audioCtx.createOscillator();
  lfo.frequency.value = chirpRate;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 0.5;
  lfo.connect(lfoGain);
  lfoGain.connect(gain.gain);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(panner);
  panner.connect(window.masterOut);

  osc.start();
  lfo.start();

  // Schedule chirp bursts
  let active = true;
  function scheduleBurst() {
    if (!active) return;
    const now = audioCtx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.06, now + 0.02);
    gain.gain.setValueAtTime(0.06, now + burstDuration - 0.02);
    gain.gain.linearRampToValueAtTime(0, now + burstDuration);
    const nextTime = (burstInterval + Math.random() * 1) * 1000;
    creature.timer = setTimeout(scheduleBurst, nextTime);
  }
  // Initial random delay so they don't all start together
  creature.timer = setTimeout(scheduleBurst, Math.random() * 2000);

  creature.cleanup = () => {
    active = false;
    clearTimeout(creature.timer);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
    setTimeout(() => { osc.stop(); lfo.stop(); }, 500);
  };
}

function createFrogSound(creature) {
  // Tree frog: low-pitched repeated croak with frequency sweep
  const baseFreq = 180 + Math.random() * 120;
  const croakInterval = 2 + Math.random() * 4;

  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  const panner = audioCtx.createStereoPanner();
  panner.pan.value = (creature.x / W) * 2 - 1;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = baseFreq * 3;
  filter.Q.value = 5;

  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.value = baseFreq;

  // Formant resonance for "ribbit" quality
  const formant = audioCtx.createBiquadFilter();
  formant.type = 'bandpass';
  formant.frequency.value = baseFreq * 2;
  formant.Q.value = 8;

  osc.connect(filter);
  filter.connect(formant);
  formant.connect(gain);
  gain.connect(panner);
  panner.connect(window.masterOut);

  osc.start();

  let active = true;
  function scheduleCroak() {
    if (!active) return;
    const now = audioCtx.currentTime;
    // Two-part croak
    osc.frequency.setValueAtTime(baseFreq * 1.2, now);
    osc.frequency.linearRampToValueAtTime(baseFreq * 0.8, now + 0.15);

    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.08, now + 0.02);
    gain.gain.linearRampToValueAtTime(0.03, now + 0.08);
    gain.gain.linearRampToValueAtTime(0.07, now + 0.1);
    gain.gain.linearRampToValueAtTime(0, now + 0.2);

    const nextTime = (croakInterval + Math.random() * 2) * 1000;
    creature.timer = setTimeout(scheduleCroak, nextTime);
  }
  creature.timer = setTimeout(scheduleCroak, Math.random() * 3000);

  creature.cleanup = () => {
    active = false;
    clearTimeout(creature.timer);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
    setTimeout(() => { osc.stop(); }, 500);
  };
}

function createOwlSound(creature) {
  // Owl: low, breathy hoot with harmonic overtones
  const baseFreq = 280 + Math.random() * 60;
  const hootInterval = 5 + Math.random() * 8;

  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  const panner = audioCtx.createStereoPanner();
  panner.pan.value = (creature.x / W) * 2 - 1;

  // Two oscillators for harmonics
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.value = baseFreq;
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = baseFreq * 2;
  const gain2 = audioCtx.createGain();
  gain2.gain.value = 0.15;

  // Breathy noise layer
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0;
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = baseFreq * 1.5;
  noiseFilter.Q.value = 3;

  const noise = audioCtx.createBufferSource();
  noise.buffer = createNoiseBuffer(2);
  noise.loop = true;
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);

  osc1.connect(gain);
  osc2.connect(gain2);
  gain2.connect(gain);
  noiseGain.connect(gain);
  gain.connect(panner);
  panner.connect(window.masterOut);

  osc1.start();
  osc2.start();
  noise.start();

  let active = true;
  function scheduleHoot() {
    if (!active) return;
    const now = audioCtx.currentTime;
    // "hoo... hoo-hoo" pattern
    // First hoot
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.07, now + 0.1);
    gain.gain.linearRampToValueAtTime(0.05, now + 0.4);
    gain.gain.linearRampToValueAtTime(0, now + 0.6);
    noiseGain.gain.setValueAtTime(0, now);
    noiseGain.gain.linearRampToValueAtTime(0.015, now + 0.1);
    noiseGain.gain.linearRampToValueAtTime(0, now + 0.6);

    // Second hoot (slightly higher)
    osc1.frequency.setValueAtTime(baseFreq, now);
    osc1.frequency.setValueAtTime(baseFreq * 1.05, now + 0.9);
    gain.gain.setValueAtTime(0, now + 0.9);
    gain.gain.linearRampToValueAtTime(0.06, now + 1.0);
    gain.gain.linearRampToValueAtTime(0, now + 1.4);
    noiseGain.gain.setValueAtTime(0, now + 0.9);
    noiseGain.gain.linearRampToValueAtTime(0.012, now + 1.0);
    noiseGain.gain.linearRampToValueAtTime(0, now + 1.4);
    osc1.frequency.setValueAtTime(baseFreq, now + 1.5);

    const nextTime = (hootInterval + Math.random() * 4) * 1000;
    creature.timer = setTimeout(scheduleHoot, nextTime);
  }
  creature.timer = setTimeout(scheduleHoot, Math.random() * 5000);

  creature.cleanup = () => {
    active = false;
    clearTimeout(creature.timer);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
    setTimeout(() => { osc1.stop(); osc2.stop(); noise.stop(); }, 700);
  };
}

function createWindSound(creature) {
  // Wind: filtered noise with slow modulation
  const noise = audioCtx.createBufferSource();
  noise.buffer = createNoiseBuffer(4);
  noise.loop = true;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 400 + Math.random() * 200;
  filter.Q.value = 0.8;

  const gain = audioCtx.createGain();
  gain.gain.value = 0.04;
  const panner = audioCtx.createStereoPanner();
  panner.pan.value = (creature.x / W) * 2 - 1;

  // Slow LFO to modulate filter frequency (gusting)
  const lfo = audioCtx.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 0.1 + Math.random() * 0.15;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 200;
  lfo.connect(lfoGain);
  lfoGain.connect(filter.frequency);

  // Volume modulation
  const volLfo = audioCtx.createOscillator();
  volLfo.type = 'sine';
  volLfo.frequency.value = 0.05 + Math.random() * 0.08;
  const volLfoGain = audioCtx.createGain();
  volLfoGain.gain.value = 0.02;
  volLfo.connect(volLfoGain);
  volLfoGain.connect(gain.gain);

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(panner);
  panner.connect(window.masterOut);

  noise.start();
  lfo.start();
  volLfo.start();

  // Fade in
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 2);

  creature.cleanup = () => {
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
    setTimeout(() => { noise.stop(); lfo.stop(); volLfo.stop(); }, 1200);
  };
}

function createWaterSound(creature) {
  // Water: trickling/dripping — filtered noise + random drips
  const noise = audioCtx.createBufferSource();
  noise.buffer = createNoiseBuffer(4);
  noise.loop = true;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 2000 + Math.random() * 1000;
  filter.Q.value = 2;

  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  const panner = audioCtx.createStereoPanner();
  panner.pan.value = (creature.x / W) * 2 - 1;

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(panner);
  panner.connect(window.masterOut);

  noise.start();

  // Continuous trickle
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.025, audioCtx.currentTime + 1);

  // Random drip sounds
  let active = true;
  function scheduleDrip() {
    if (!active) return;
    const now = audioCtx.currentTime;
    const dripFreq = 1800 + Math.random() * 2400;

    const dripOsc = audioCtx.createOscillator();
    dripOsc.type = 'sine';
    dripOsc.frequency.setValueAtTime(dripFreq, now);
    dripOsc.frequency.exponentialRampToValueAtTime(dripFreq * 0.5, now + 0.08);

    const dripGain = audioCtx.createGain();
    dripGain.gain.setValueAtTime(0.04, now);
    dripGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

    dripOsc.connect(dripGain);
    dripGain.connect(panner);

    dripOsc.start(now);
    dripOsc.stop(now + 0.15);

    creature.timer = setTimeout(scheduleDrip, 300 + Math.random() * 2000);
  }
  creature.timer = setTimeout(scheduleDrip, Math.random() * 1000);

  creature.cleanup = () => {
    active = false;
    clearTimeout(creature.timer);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
    setTimeout(() => { noise.stop(); }, 700);
  };
}

// --- Creature visual properties ---
const creatureVisuals = {
  cricket: { color: [140, 180, 100], glowSize: 4, symbol: '🦗', pulseSpeed: 0.08 },
  frog:    { color: [100, 180, 120], glowSize: 6, symbol: '🐸', pulseSpeed: 0.03 },
  owl:     { color: [180, 160, 120], glowSize: 10, symbol: '🦉', pulseSpeed: 0.015 },
  wind:    { color: [140, 160, 180], glowSize: 20, symbol: '🌿', pulseSpeed: 0.04 },
  water:   { color: [120, 160, 200], glowSize: 8, symbol: '💧', pulseSpeed: 0.06 }
};

const creatureGenerators = {
  cricket: createCricketSound,
  frog: createFrogSound,
  owl: createOwlSound,
  wind: createWindSound,
  water: createWaterSound
};

// --- Interaction ---

document.getElementById('intro').addEventListener('click', () => {
  initAudio();
  started = true;
  const intro = document.getElementById('intro');
  intro.style.opacity = '0';
  setTimeout(() => intro.style.display = 'none', 800);
  document.getElementById('palette').classList.add('visible');
  setTimeout(() => {
    document.getElementById('hint').classList.add('visible');
    setTimeout(() => document.getElementById('hint').classList.remove('visible'), 3000);
  }, 500);
});

document.querySelectorAll('.creature-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.creature-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.dataset.type;
  });
});

document.getElementById('clear-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  creatures.forEach(c => c.cleanup && c.cleanup());
  creatures = [];
});

canvas.addEventListener('click', (e) => {
  if (!started) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  // Don't place on the palette area
  if (y > H - 70) return;

  const creature = {
    x, y,
    type: selectedType,
    born: time,
    phase: Math.random() * Math.PI * 2
  };

  creatures.push(creature);
  creatureGenerators[selectedType](creature);
});

// Right-click to remove nearest creature
canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (!started || creatures.length === 0) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  let nearest = 0;
  let nearestDist = Infinity;
  creatures.forEach((c, i) => {
    const d = Math.hypot(c.x - mx, c.y - my);
    if (d < nearestDist) { nearestDist = d; nearest = i; }
  });

  if (nearestDist < 50) {
    creatures[nearest].cleanup && creatures[nearest].cleanup();
    creatures.splice(nearest, 1);
  }
});

// --- Rendering ---

function drawStars() {
  for (const star of stars) {
    const twinkle = Math.sin(time * star.twinkleSpeed + star.twinkleOffset);
    const alpha = star.brightness + twinkle * 0.1;
    if (alpha <= 0) continue;
    ctx.fillStyle = `rgba(200, 210, 230, ${alpha})`;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGround() {
  // Gentle gradient for ground
  const grad = ctx.createLinearGradient(0, H * 0.75, 0, H);
  grad.addColorStop(0, 'rgba(15, 25, 15, 0)');
  grad.addColorStop(0.3, 'rgba(15, 25, 15, 0.3)');
  grad.addColorStop(1, 'rgba(10, 20, 10, 0.5)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H * 0.75, W, H * 0.25);

  // Sparse grass blades
  ctx.strokeStyle = 'rgba(40, 70, 30, 0.15)';
  ctx.lineWidth = 1;
  for (let i = 0; i < W; i += 12 + Math.random() * 8) {
    const baseY = H * 0.85 + Math.random() * H * 0.12;
    const height = 8 + Math.random() * 20;
    const sway = Math.sin(time * 0.001 + i * 0.05) * 3;
    ctx.beginPath();
    ctx.moveTo(i, baseY);
    ctx.quadraticCurveTo(i + sway, baseY - height * 0.6, i + sway * 1.5, baseY - height);
    ctx.stroke();
  }
}

function drawCreature(creature) {
  const vis = creatureVisuals[creature.type];
  const age = time - creature.born;
  const fadeIn = Math.min(1, age / 60);
  const pulse = 0.7 + 0.3 * Math.sin(time * vis.pulseSpeed + creature.phase);

  // Glow
  const glowAlpha = 0.12 * fadeIn * pulse;
  const grad = ctx.createRadialGradient(
    creature.x, creature.y, 0,
    creature.x, creature.y, vis.glowSize * 3
  );
  grad.addColorStop(0, `rgba(${vis.color[0]}, ${vis.color[1]}, ${vis.color[2]}, ${glowAlpha})`);
  grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(creature.x, creature.y, vis.glowSize * 3, 0, Math.PI * 2);
  ctx.fill();

  // Core dot
  ctx.fillStyle = `rgba(${vis.color[0]}, ${vis.color[1]}, ${vis.color[2]}, ${0.4 * fadeIn * pulse})`;
  ctx.beginPath();
  ctx.arc(creature.x, creature.y, vis.glowSize * 0.5, 0, Math.PI * 2);
  ctx.fill();

  // Tiny label
  ctx.font = `${10 + vis.glowSize * 0.5}px serif`;
  ctx.fillText(vis.symbol, creature.x - 6, creature.y - vis.glowSize - 4);
}

function drawConnections() {
  // Draw faint lines between nearby same-type creatures
  for (let i = 0; i < creatures.length; i++) {
    for (let j = i + 1; j < creatures.length; j++) {
      if (creatures[i].type !== creatures[j].type) continue;
      const d = Math.hypot(creatures[i].x - creatures[j].x, creatures[i].y - creatures[j].y);
      if (d > 200) continue;
      const vis = creatureVisuals[creatures[i].type];
      const alpha = (1 - d / 200) * 0.06;
      ctx.strokeStyle = `rgba(${vis.color[0]}, ${vis.color[1]}, ${vis.color[2]}, ${alpha})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(creatures[i].x, creatures[i].y);
      ctx.lineTo(creatures[j].x, creatures[j].y);
      ctx.stroke();
    }
  }
}

function render() {
  time++;
  ctx.fillStyle = '#080c10';
  ctx.fillRect(0, 0, W, H);

  drawStars();
  drawGround();
  drawConnections();
  creatures.forEach(drawCreature);

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
