<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murmurations — Pip</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; overflow: hidden; cursor: default; }
  canvas { display: block; cursor: crosshair; }
  #ui {
    position: fixed;
    bottom: 16px;
    left: 16px;
    right: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
    pointer-events: none;
  }
  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    pointer-events: auto;
  }
  .slider-group label {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .slider-group input[type="range"] {
    width: 110px;
    accent-color: #c07848;
    height: 3px;
  }
  .slider-group .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.25);
  }
  #presets {
    display: flex;
    gap: 6px;
    margin-left: auto;
    pointer-events: auto;
  }
  #presets button {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  #presets button:hover {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
  }
  #presets button.active {
    border-color: #c07848;
    color: #c07848;
  }
  #info {
    position: fixed;
    top: 16px;
    left: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    line-height: 1.7;
    pointer-events: none;
    transition: opacity 1s;
  }
  #stats {
    position: fixed;
    top: 16px;
    right: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.15);
    text-align: right;
    line-height: 1.7;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="info">
  <div>murmurations</div>
  <div style="margin-top: 4px;">click to attract · right-click to scatter</div>
  <div>space to pause · r to reset</div>
</div>

<div id="stats">
  <div id="count-display"></div>
  <div id="alignment-display"></div>
</div>

<div id="ui">
  <div class="slider-group">
    <label>separation</label>
    <input type="range" id="sep" min="0" max="3" step="0.05" value="1.2">
    <div class="val" id="sep-val">1.20</div>
  </div>
  <div class="slider-group">
    <label>alignment</label>
    <input type="range" id="ali" min="0" max="3" step="0.05" value="1.0">
    <div class="val" id="ali-val">1.00</div>
  </div>
  <div class="slider-group">
    <label>cohesion</label>
    <input type="range" id="coh" min="0" max="3" step="0.05" value="1.0">
    <div class="val" id="coh-val">1.00</div>
  </div>
  <div class="slider-group">
    <label>range</label>
    <input type="range" id="range" min="20" max="150" step="1" value="60">
    <div class="val" id="range-val">60</div>
  </div>
  <div id="presets">
    <button class="active" data-preset="murmuration">murmuration</button>
    <button data-preset="swarm">swarm</button>
    <button data-preset="school">school</button>
    <button data-preset="chaos">chaos</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Sliders
const sepS = document.getElementById('sep');
const aliS = document.getElementById('ali');
const cohS = document.getElementById('coh');
const rangeS = document.getElementById('range');
const sepV = document.getElementById('sep-val');
const aliV = document.getElementById('ali-val');
const cohV = document.getElementById('coh-val');
const rangeV = document.getElementById('range-val');
const countD = document.getElementById('count-display');
const alignD = document.getElementById('alignment-display');

sepS.addEventListener('input', () => { sepV.textContent = parseFloat(sepS.value).toFixed(2); clearPreset(); });
aliS.addEventListener('input', () => { aliV.textContent = parseFloat(aliS.value).toFixed(2); clearPreset(); });
cohS.addEventListener('input', () => { cohV.textContent = parseFloat(cohS.value).toFixed(2); clearPreset(); });
rangeS.addEventListener('input', () => { rangeV.textContent = rangeS.value; clearPreset(); });

// Presets
const PRESETS = {
  murmuration: { sep: 1.2, ali: 1.0, coh: 1.0, range: 60, speed: 2.5 },
  swarm:       { sep: 0.8, ali: 0.3, coh: 2.2, range: 45, speed: 2.0 },
  school:      { sep: 1.5, ali: 2.0, coh: 0.8, range: 50, speed: 3.0 },
  chaos:       { sep: 0.3, ali: 0.2, coh: 0.2, range: 30, speed: 4.0 },
};

let currentPreset = 'murmuration';
let maxSpeed = 2.5;

function applyPreset(name) {
  const p = PRESETS[name];
  sepS.value = p.sep; sepV.textContent = p.sep.toFixed(2);
  aliS.value = p.ali; aliV.textContent = p.ali.toFixed(2);
  cohS.value = p.coh; cohV.textContent = p.coh.toFixed(2);
  rangeS.value = p.range; rangeV.textContent = p.range;
  maxSpeed = p.speed;
  currentPreset = name;
  document.querySelectorAll('#presets button').forEach(b => {
    b.classList.toggle('active', b.dataset.preset === name);
  });
}

function clearPreset() {
  currentPreset = null;
  document.querySelectorAll('#presets button').forEach(b => b.classList.remove('active'));
}

document.querySelectorAll('#presets button').forEach(btn => {
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
});

// Boids
const N = 300;
let boids = [];
let paused = false;

function initBoids() {
  boids = [];
  for (let i = 0; i < N; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 1.5;
    boids.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      fox: Math.random() < 0.05, // ~5% fox-colored
    });
  }
}

// Mouse interaction
let mouse = { x: -1000, y: -1000, active: false, repel: false };

canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
canvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  mouse.active = true;
  mouse.repel = e.button === 2;
});
canvas.addEventListener('mouseup', () => { mouse.active = false; });
canvas.addEventListener('mouseleave', () => { mouse.active = false; });
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

document.addEventListener('keydown', (e) => {
  if (e.key === ' ') { paused = !paused; e.preventDefault(); }
  if (e.key === 'r') { initBoids(); }
});

// Spatial hash
class Grid {
  constructor(cellSize) {
    this.cs = cellSize;
    this.cells = new Map();
  }
  clear() { this.cells.clear(); }
  key(x, y) { return ((x / this.cs) | 0) + ',' + ((y / this.cs) | 0); }
  insert(b) {
    const k = this.key(b.x, b.y);
    let c = this.cells.get(k);
    if (!c) { c = []; this.cells.set(k, c); }
    c.push(b);
  }
  query(x, y, r) {
    const results = [];
    const r2 = r * r;
    const x0 = ((x - r) / this.cs) | 0;
    const x1 = ((x + r) / this.cs) | 0;
    const y0 = ((y - r) / this.cs) | 0;
    const y1 = ((y + r) / this.cs) | 0;
    for (let cx = x0; cx <= x1; cx++) {
      for (let cy = y0; cy <= y1; cy++) {
        const cell = this.cells.get(cx + ',' + cy);
        if (!cell) continue;
        for (const b of cell) {
          const dx = b.x - x, dy = b.y - y;
          if (dx * dx + dy * dy <= r2) results.push(b);
        }
      }
    }
    return results;
  }
}

const grid = new Grid(60);

function step() {
  const sepW = parseFloat(sepS.value);
  const aliW = parseFloat(aliS.value);
  const cohW = parseFloat(cohS.value);
  const range = parseFloat(rangeS.value);
  const sepDist = range * 0.4;

  // Build spatial hash
  grid.clear();
  for (const b of boids) grid.insert(b);

  for (const b of boids) {
    const neighbors = grid.query(b.x, b.y, range);

    let sepX = 0, sepY = 0;
    let aliX = 0, aliY = 0;
    let cohX = 0, cohY = 0;
    let count = 0;

    for (const n of neighbors) {
      if (n === b) continue;
      const dx = n.x - b.x;
      const dy = n.y - b.y;
      const d = Math.sqrt(dx * dx + dy * dy);

      // Separation
      if (d < sepDist && d > 0) {
        sepX -= dx / d;
        sepY -= dy / d;
      }

      // Alignment & Cohesion
      aliX += n.vx;
      aliY += n.vy;
      cohX += n.x;
      cohY += n.y;
      count++;
    }

    if (count > 0) {
      // Alignment: steer toward average heading
      aliX /= count; aliY /= count;
      const am = Math.sqrt(aliX * aliX + aliY * aliY);
      if (am > 0) { aliX /= am; aliY /= am; }

      // Cohesion: steer toward center of mass
      cohX = cohX / count - b.x;
      cohY = cohY / count - b.y;
      const cm = Math.sqrt(cohX * cohX + cohY * cohY);
      if (cm > 0) { cohX /= cm; cohY /= cm; }
    }

    // Normalize separation
    const sm = Math.sqrt(sepX * sepX + sepY * sepY);
    if (sm > 0) { sepX /= sm; sepY /= sm; }

    // Apply forces
    const force = 0.15;
    b.vx += (sepX * sepW + aliX * aliW + cohX * cohW) * force;
    b.vy += (sepY * sepW + aliY * aliW + cohY * cohW) * force;

    // Mouse interaction
    if (mouse.active) {
      const dx = mouse.x - b.x;
      const dy = mouse.y - b.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 200 && d > 0) {
        const strength = (1 - d / 200) * 0.8;
        if (mouse.repel) {
          b.vx -= (dx / d) * strength;
          b.vy -= (dy / d) * strength;
        } else {
          b.vx += (dx / d) * strength * 0.4;
          b.vy += (dy / d) * strength * 0.4;
        }
      }
    }

    // Speed limit
    const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    if (speed > maxSpeed) {
      b.vx = (b.vx / speed) * maxSpeed;
      b.vy = (b.vy / speed) * maxSpeed;
    }
    // Min speed
    if (speed < 0.5) {
      b.vx = (b.vx / (speed || 1)) * 0.5;
      b.vy = (b.vy / (speed || 1)) * 0.5;
    }

    // Update position
    b.x += b.vx;
    b.y += b.vy;

    // Wrap
    if (b.x < 0) b.x += W;
    if (b.x > W) b.x -= W;
    if (b.y < 0) b.y += H;
    if (b.y > H) b.y -= H;
  }
}

function draw() {
  // Trail fade
  ctx.fillStyle = 'rgba(10, 10, 18, 0.18)';
  ctx.fillRect(0, 0, W, H);

  // Compute global heading for alignment coloring
  let gvx = 0, gvy = 0;
  for (const b of boids) { gvx += b.vx; gvy += b.vy; }
  const gTheta = Math.atan2(gvy, gvx);
  const phi = Math.sqrt(gvx * gvx + gvy * gvy) / boids.length;

  for (const b of boids) {
    const angle = Math.atan2(b.vy, b.vx);
    const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    const len = 3 + speed * 2;

    const dx = Math.cos(angle);
    const dy = Math.sin(angle);

    if (b.fox) {
      // Fox-colored boids: warm orange glow
      ctx.fillStyle = 'rgba(220, 140, 60, 0.85)';
      ctx.shadowColor = 'rgba(220, 140, 60, 0.3)';
      ctx.shadowBlur = 6;
    } else {
      // Color by alignment with global heading
      const alignment = Math.cos(angle - gTheta);
      const t = (alignment + 1) / 2;
      const r = Math.round(100 + t * 100);
      const g = Math.round(100 + t * 60);
      const bl = Math.round(130 + t * 40);
      ctx.fillStyle = `rgba(${r},${g},${bl},${0.4 + t * 0.3})`;
      ctx.shadowBlur = 0;
    }

    ctx.beginPath();
    ctx.moveTo(b.x + dx * len, b.y + dy * len);
    ctx.lineTo(b.x - dx * 2 - dy * 2, b.y - dy * 2 + dx * 2);
    ctx.lineTo(b.x - dx * 2 + dy * 2, b.y - dy * 2 - dx * 2);
    ctx.closePath();
    ctx.fill();

    if (b.fox) ctx.shadowBlur = 0;
  }

  // Stats
  countD.textContent = `${boids.length} boids`;
  const phiNorm = (phi / maxSpeed);
  alignD.textContent = `φ ${phiNorm.toFixed(3)}`;
}

function animate() {
  if (!paused) {
    step();
    draw();
  }
  requestAnimationFrame(animate);
}

initBoids();
animate();

// Fade info after 5s
setTimeout(() => {
  document.getElementById('info').style.opacity = '0';
}, 8000);
</script>
</body>
</html>
